        。title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffd966;
            text-shadow: 0 0 8px #ffd90066;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;

            align-items: center;

        .ip-location {
            font-size: 0.9rem;
            background: linear-gradient(135deg, #38b000, #7209b7, #f72585);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 8s ease infinite;
            background-size: 200% 200%;
            white-space: nowrap;
            /* ========== 已补圆角 ========== */
            background-color: rgba(255,215,0,0.1);
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid rgba(255,215,0,0.25);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .live-badge {
            background: #ffd966;
            color: #0a0c10;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;

            background: rgba(255,215,0,0.1);

            border: 1px solid rgba(255,215,0,0.3);

            gap: 8px;
            letter-spacing: 0.5px;

            height: 720px;
            max-height: 82vh;
            display: flex;
            gap: 10px;
            background: transparent;

            display: flex;
            flex-direction: column;

            overflow: hidden;

            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            flex-shrink: 0;
            justify-content: center;

            color: #b5b9c4;

            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
            backdrop-filter: blur(5px);
            flex: 0 1 auto;
        }
        .tab-btn.active {
            background: #ffd966;
            border-color: #ffd966;
            color: #0a0c10;
            font-weight: 600;
            box-shadow: 0 0 12px #ffd966;
        }

        /* 频道网格 */
        .channel-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            align-content: start;
            overflow-y: auto;
            padding: 4px 2px 8px 2px;
            scrollbar-width: thin;
            scrollbar-color: #ffd966 #2a2e3a;
            min-height: 0;

            border-radius: 5px;

    // 显示通知提示
    function showNotification(message) {
        const notificationEl = document.getElementById('notification');
        notificationEl.textContent = message;
        notificationEl.classList.add('show');
        
        setTimeout(() => {
            notificationEl.classList.remove('show');
        }, 3000);
    }

    // 获取IP归属地（使用ipip.net接口）
    async function getIPLocation() {
        try {
            const response = await fetch('https://myip.ipip.net/');
            const text = await response.text();
            
            // 解析返回的文本内容（适配ipip.net的返回格式）
            const ipMatch = text.match(/\d+\.\d+\.\d+\.\d+/);
            const locationMatch = text.match(/来自于：(.+)/);
            
            if (ipMatch && locationMatch) {
                const ipEl = document.getElementById('ip-location');
                ipEl.textContent = `IP: ${ipMatch[0]} (${locationMatch[1].trim()})`;
            } else {
                throw new Error('无法解析IP归属地信息');
            }
        } catch (error) {
            const ipEl = document.getElementById('ip-location');
            ipEl.textContent = 'IP: 获取失败，重试中...';
            showNotification('获取IP归属地失败，稍后重试');
            setTimeout(getIPLocation, 10000); // 10秒后重试
        }
    }

        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        const second = String(now.getSeconds()).padStart(2, '0');
        const fullStr = `${y}-${m}-${d} ${week} ${hour}:${minute}:${second}`;
        const fullElem = document.getElementById('headerFullDateTime');
        if (fullElem) fullElem.innerText = fullStr;

        { name: 'JTBC', url: `${BASE}/216/index.m3u8`, group: 'asia' },
        { name: 'Arirang', url: `${BASE}/217/index.m3u8`, group: 'asia' },
        { name: 'TVB翡翠', url: `${BASE}/220/index.m3u8`, group: 'asia' },
        { name: 'TVB明珠', url: `${BASE}/221/index.m3u8`, group: 'asia' },
        { name: '凤凰中文', url: `${BASE}/222/index.m3u8`, group: 'asia' },
        { name: '凤凰资讯', url: `${BASE}/223/index.m3u8`, group: 'asia' },
        { name: '星空卫视', url: `${BASE}/224/index.m3u8`, group: 'asia' },
        { name: 'Channel NewsAsia', url: `${BASE}/225/index.m3u8`, group: 'asia' },
        { name: 'HBO亚洲', url: `${BASE}/226/index.m3u8`, group: 'asia' },
    ];

    // ---------- 5. 渲染分组 ----------
    function renderGroup(groupId, groupName) {
        const container = document.getElementById(groupId);
        if (!container) return;
        container.innerHTML = '';
        const filtered = channels.filter(c => c.group === groupName);
        filtered.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.setAttribute('data-name', ch.name);
            card.innerText = ch.name;
            card.onclick = () => playChannel(ch.name, ch.url);
            container.appendChild(card);
        });
    }

    // 执行所有分组渲染
    renderGroup('cctvGroup', 'cctv');
    renderGroup('cgtnGroup', 'cgtn');
    renderGroup('payGroup', 'pay');
    renderGroup('weishiGroup', 'weishi');
    renderGroup('asiaGroup', 'asia');

    // ---------- 6. 核心：打开网页自动播放 CCTV-1 ----------
    function autoPlayCCTV1() {
        const cctv1 = channels.find(c => c.name === 'CCTV-1');
        if (cctv1) {
            // 立即设置并播放
            playChannel(cctv1.name, cctv1.url);
            
            // 兼容处理：多轮尝试 + 交互触发
            const retryPlay = () => {
                if (video.paused && video.src) {
                    video.play().catch(() => {});
                }
            };
            // 1秒后重试一次
            setTimeout(retryPlay, 1000);
            // 监听页面点击事件，触发播放
            document.addEventListener('click', retryPlay, { once: true });
        }
    }
    autoPlayCCTV1();

    // ---------- 7. 选项卡切换逻辑 ----------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            // 移除所有激活态
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // 激活当前按钮
            this.classList.add('active');
            // 隐藏所有分组
            document.querySelectorAll('.channel-grid').forEach(grid => grid.style.display = 'none');
            // 显示对应分组
            const groupId = `${this.dataset.group}Group`;
            const targetGrid = document.getElementById(groupId);
            if (targetGrid) {
                targetGrid.style.display = 'grid';
            }
        });
    });

    // ---------- 8. 初始化IP查询 ----------
    getIPLocation(); // 首次加载获取IP归属地

})();
</script>
</body>
